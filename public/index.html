<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://vk.com/js/api/xd_connection.js?2"></script>
    <script src="https://vk.com/js/api/bridge.js?2"></script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Web site created using create-react-app" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Герой рядом</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <script>
        function initVK() {
            if (typeof vkBridge !== 'undefined') {
                console.log('VK Bridge found, initializing...');
                vkBridge.send('VKWebAppInit');
            } else {
                setTimeout(initVK, 100);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initVK);
        } else {
            initVK();
        }
    </script>
  </body>
</html>
